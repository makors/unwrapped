services:
  server:
    build: ./server
    restart: unless-stopped
    env_file: .env
    volumes:
      - server-data:/data
    command: ["-addr", ":8080"]
    working_dir: /data

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - server

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt

volumes:
  server-data:
  certbot-www:
  certbot-certs:
